<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조선대학교 캠퍼스 맵</title>
    <!-- 이미지 미리 불러오기 -->
    <link rel="preload" as="image" href="{{ url_for('static', filename='img/campusMap.jpg') }}">
    <style>
        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#f4f4f4;
            color:#333
        }
        .wrap{
            max-width:1200px;
            min-width:650px;      /* 전체 최소 폭 */
            margin:24px auto;
            padding:0 16px;
        }
        .title{margin:0 0 12px 0}
        .map{
            position:relative;
            width:100%;
            aspect-ratio: 940 / 441;
            min-width: 800px;     /* 지도 최소 크기 */
            min-height: 280px;    
            background:url("{{ url_for('static', filename='img/campusMap.jpg') }}") center/cover no-repeat;
            border-radius:14px;
            box-shadow:0 6px 24px rgba(0,0,0,.12);
            overflow:hidden;
        }
        /* 지도 위 버튼(말풍선 + 꼬리) */
        .marker{
        position:absolute;
        left:0; top:0;
        width:15px;
        height:15px;
        transform:translate(-50%, -50%); /* 좌표 기준 :점 중앙 */
        
        background:#ffffff;                       /* 내부 흰색 */
        border:4px solid #2563eb;                 /* 파란 테두리 */
        border-radius:50%;                        /* 동그란 버튼 */
        
        box-shadow:0 0 6px rgba(37,99,235,0.4);  
        cursor:pointer;
        text-decoration:none;

        transition:transform .15s ease, box-shadow .15s ease;
        }

        /* Hover 시 점 확대 + 글로우 강화 */
        .marker:hover{
        transform:translate(-50%, -50%) scale(1.2);
        box-shadow:0 0 10px rgba(37,99,235,0.65);
        }

        /* 말풍선(툴팁) */
        .marker .tooltip{
        position:absolute;
        left:50%;
        bottom:22px;  /* 점 위로 띄우기 */
        transform:translate(-50%, 10px);
        padding:8px 12px;
        
        background:#ffffff;        /* 말풍선도 흰색 내부 */
        color:#2563eb;             /* 텍스트 파란색 */
        border-radius:12px;
        border:2px solid #2563eb;  /* 파란 테두리 */
        font-size:13px;
        white-space:nowrap;
        
        box-shadow:0 3px 12px rgba(0,0,0,0.15);

        opacity:0;
        pointer-events:none;

        transition:opacity .15s ease, transform .15s ease;
        }

        /* 말풍선 꼬리 */
        .marker .tooltip::after{
        content:"";
        position:absolute;
        left:50%;
        top:100%;
        transform:translateX(-50%);
        
        width:0;
        height:0;
        border-left:6px solid transparent;
        border-right:6px solid transparent;
        border-top:8px solid #2563eb; /* 파란색 외곽선 */
        }

        /* Hover 시 말풍선 표시 */
        .marker:hover .tooltip{
        opacity:1;
        transform:translate(-50%, 0);
        }
    </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">조선대학교</h1>
    <hr>
    <div class="map" aria-label="캠퍼스 지도">
        <!--버튼은 퍼센트 좌표로 배치됨. 더 추가하려면 같은 형식의 <a class="marker">를 복사해 좌표만 바꾸면 된다-->>
        <!--테스트용 버튼 -->
        <a class="marker"
            href="{{ url_for('test') }}"
            style="left:50%; top:50%;">
            <span class="tooltip">테스트</span>
        </a>
        <!--IT융합대학 버튼 -->
        <a class="marker"
            href="{{ url_for('it_campus') }}"
            style="left:59%; top:18%;">
            <span class="tooltip">IT 융합대학</span>
        </a>
        <!--솔마루 버튼 -->
        <a class="marker"
            href="{{ url_for('solmaru') }}"
            style="left:47%; top:28%;">
            <span class="tooltip">솔마루</span>
        </a>
    </div>
  </div>
</body>
</html>
