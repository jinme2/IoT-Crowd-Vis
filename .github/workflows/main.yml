name: Daily Backup Job

on:
  schedule:
    - cron: "59 14 * * *"   # 한국시간 23:59 = UTC 14:59
  workflow_dispatch:

jobs:
  run-daily-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pymysql pandas pytz scikit-learn

      - name: Run daily job
        env:
          MYSQLHOST: ${{ secrets.MYSQLHOST }}
          MYSQLUSER: ${{ secrets.MYSQLUSER }}
          MYSQLPASSWORD: ${{ secrets.MYSQLPASSWORD }}
          MYSQLDATABASE: ${{ secrets.MYSQLDATABASE }}
          MYSQLPORT: ${{ secrets.MYSQLPORT }}
        run: |
          python daily_job.py

      - name: Commit updated CSV/JSON
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Daily update" || echo "No changes"
          git pull origin main --rebase
          git push
